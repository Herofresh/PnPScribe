services:
    postgres:
        image: ankane/pgvector
        container_name: pnpscribe-postgres
        environment:
            POSTGRES_USER: pnp
            POSTGRES_PASSWORD: pnp
            POSTGRES_DB: pnp
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data

    redis:
        image: redis:7
        container_name: pnpscribe-redis
        ports:
            - "6379:6379"

volumes:
    pgdata:
